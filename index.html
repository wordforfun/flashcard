<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童趣味字卡</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* === 分類按鈕選單樣式 === */
        .category-select {
            margin-bottom: 25px;
        }

        .category-btn {
            background-color: #e0e0e0;
            color: #333;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            transition: 0.2s;
        }

        .category-btn.active {
            background-color: #ff5722;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* === 字卡 3D 效果設定 === */
        .card {
            width: 300px;
            height: 350px;
            margin: 0 auto 30px auto;
            perspective: 1000px; /* 啟動 3D 空間 */
            cursor: pointer;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 翻到背面時，隱藏正面 */
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        /* 正面樣式 */
        .card-front {
            background-color: #ffffff;
            border: 4px solid #ffcb05;
        }

        /* 背面樣式 */
        .card-back {
            background-color: #ffcb05;
            color: white;
            transform: rotateY(180deg); /* 預先翻轉 180 度 */
        }

        /* 當卡片被加上 .flipped 類別時翻轉 */
        .card.flipped .card-front {
            transform: rotateY(180deg);
        }
        .card.flipped .card-back {
            transform: rotateY(360deg);
        }

        .emoji {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 40px;
            margin: 10px 0;
        }

        p {
            color: #888;
            font-size: 14px;
        }

        .card-back p {
            color: #fff;
        }

        /* === 控制按鈕樣式 === */
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #sound-btn {
            background-color: #2196f3;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🦁 兒童英文單字卡 🍎</h1>
        
        <div class="category-select">
            <button class="category-btn active" data-cat="fruits">🍓 水果篇</button>
            <button class="category-btn" data-cat="animals">🦁 動物篇</button>
            <button class="category-btn" data-cat="vehicles">🚗 交通工具篇</button>
        </div>
        
        <div class="card" id="flashcard">
            <div class="card-face card-front">
                <span class="emoji" id="card-emoji">🍎</span>
                <h2 id="card-word">Apple</h2>
                <p>點擊卡片看中文</p>
            </div>
            <div class="card-face card-back">
                <h2 id="card-translation">蘋果</h2>
                <p>點擊卡片看英文</p>
            </div>
        </div>

        <div class="controls">
            <button id="sound-btn">🔊 發音</button>
            <button id="next-btn">下一張 ➡️</button>
        </div>
    </div>

    <script>
        // 1. 擴充字卡資料
        const allData = {
            fruits: [
                { word: "Apple", translation: "蘋果", emoji: "🍎" },
                { word: "Banana", translation: "香蕉", emoji: "🍌" },
                { word: "Orange", translation: "柳丁", emoji: "🍊" },
                { word: "Strawberry", translation: "草莓", emoji: "🍓" },
                { word: "Watermelon", translation: "西瓜", emoji: "🍉" }
            ],
            animals: [
                { word: "Lion", translation: "獅子", emoji: "🦁" },
                { word: "Elephant", translation: "大象", emoji: "🐘" },
                { word: "Monkey", translation: "猴子", emoji: "🐵" },
                { word: "Rabbit", translation: "兔子", emoji: "🐰" },
                { word: "Giraffe", translation: "長頸鹿", emoji: "🦒" }
            ],
            vehicles: [
                { word: "Car", translation: "汽車", emoji: "🚗" },
                { word: "Bus", translation: "公車", emoji: "🚌" },
                { word: "Train", translation: "火車", emoji: "🚂" },
                { word: "Airplane", translation: "飛機", emoji: "✈️" },
                { word: "Ship", translation: "輪船", emoji: "🚢" }
            ]
        };

        let currentCategory = 'fruits';
        let currentIndex = 0;

        // 2. 抓取網頁 HTML 元素
        const card = document.getElementById('flashcard');
        const cardEmoji = document.getElementById('card-emoji');
        const cardWord = document.getElementById('card-word');
        const cardTranslation = document.getElementById('card-translation');
        const nextBtn = document.getElementById('next-btn');
        const soundBtn = document.getElementById('sound-btn');
        const categoryButtons = document.querySelectorAll('.category-btn');

        // 3. 功能：更新卡片內容
        function updateCard() {
            card.classList.remove('flipped');
            
            setTimeout(() => {
                const currentList = allData[currentCategory];
                cardEmoji.innerText = currentList[currentIndex].emoji;
                cardWord.innerText = currentList[currentIndex].word;
                cardTranslation.innerText = currentList[currentIndex].translation;
            }, 200);
        }

        // 4. 互動：點擊分類按鈕
        categoryButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelector('.category-btn.active').classList.remove('active');
                button.classList.add('active');
                
                currentCategory = button.dataset.cat;
                currentIndex = 0;
                updateCard();
            });
        });

        // 5. 互動：點擊卡片翻面
        card.addEventListener('click', () => {
            card.classList.toggle('flipped');
        });

        // 6. 互動：點擊下一張
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % allData[currentCategory].length;
            updateCard();
        });

        // 7. 互動：語音朗讀
        soundBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const currentWord = allData[currentCategory][currentIndex].word;
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
